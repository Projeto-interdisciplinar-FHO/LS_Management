{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L.S Management - Login</title>
    <link rel="stylesheet" href="{% static 'main.css' %}">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-form-side">
            <div class="form-card">
                <form method="POST">
                    {% csrf_token %}
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="********" required>
                    </div>

                    <button type="submit" class="login-submit-btn">Login</button>
                    
                    <p class="register-link">Do not account? <a href="#">registration is</a></p>
                </form>
            </div>
        </div>

        <div class="login-branding-side">
            <div class="branding-content">
                <img src="{% static 'logo-vaca-ls.png' %}" alt="Logo L.S" class="login-logo">
                <div class="login-text">
                    <h1>L.S Management</h1>
                    <p>Cuidando do seu rebanho com inteligência</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
