{% load static %}
<!DOCTYPE html>

<head>

    <title>L.S Management - Home</title>
    <link rel="stylesheet" href="{% static 'main.css' %}">
</head>
<body class="home-body">
    <main class="home-content">
        <div class="logo-container">
            <img src="{% static 'logo-vaca-ls.png' %}" alt="Logo L.S" class="main-logo">

            </div>

        <a href="{% url 'user_selection' %}" class="access-button">

    </main>

</html>
